version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: craftflow-db
    environment:
      POSTGRES_DB: craftflow
      POSTGRES_USER: craftflow
      POSTGRES_PASSWORD: craftflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craftflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: craftflow-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: craftflow
      DB_USERNAME: craftflow
      DB_PASSWORD: craftflow123
      JWT_SECRET: craftflow-production-secret-key-minimum-256-bits-long-change-in-prod
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: craftflow-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
